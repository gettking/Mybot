<!DOCTYPE html>
<html>
<head>
  <title>L1 SIM</title>
</head>

<body>

<h1>🌌 L1 Reality Engine</h1>

<h3>Global Stability: <span id="stability"></span></h3>
<h3>Chaos: <span id="chaos"></span></h3>
<h3>Day: <span id="day"></span></h3>

<hr>

<div id="logs"></div>

<button onclick="Game.stabilize()">🛠 Stabilize</button>

<script src="engine.js"></script>

<script>
function updateUI(game){

  document.getElementById("stability").innerText =
    game.global.globalStability.toFixed(1);

  document.getElementById("chaos").innerText =
    game.global.chaos;

  document.getElementById("day").innerText =
    game.global.day;

  document.getElementById("logs").innerHTML =
    game.global.events.map(e => "• " + e).join("<br>");
}

Game.start();
</script>

</body>
</html>
