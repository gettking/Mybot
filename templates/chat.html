<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin:0;
    font-family:sans-serif;
    color:white;
    overflow:hidden;
}

/* 🌌 BACKGROUND ANIMASI */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle, #0d1117, #000);
    z-index:-2;
}

body::after {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(0,255,0,0.05) 0px,
        rgba(0,255,0,0.05) 1px,
        transparent 1px,
        transparent 3px
    );
    animation: scan 6s linear infinite;
    z-index:-1;
}

@keyframes scan {
    from { transform: translateY(0); }
    to { transform: translateY(100px); }
}

/* HEADER */
.header {
    position:fixed;
    top:0;
    width:100%;
    padding:14px;
    text-align:center;
    background:rgba(22,27,34,0.9);
    backdrop-filter: blur(6px);
    font-weight:bold;
}

/* CHAT */
#chat {
    position:fixed;
    top:60px;
    bottom:80px;
    width:100%;
    overflow-y:auto;
    padding:15px;
}

/* WRAPPER biar center */
.chat-wrap {
    max-width:600px;
    margin:auto;
}

/* BUBBLE */
.msg {
    max-width:75%;
    padding:10px 12px;
    margin:8px 0;
    border-radius:14px;
    font-size:14px;
    animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(5px);}
    to {opacity:1; transform:translateY(0);}
}

/* kiri */
.left {
    background:#21262d;
}

/* kanan */
.right {
    background:#238636;
    margin-left:auto;
}

/* NAME */
.name {
    font-size:12px;
    font-weight:bold;
    margin-bottom:3px;
}

/* TIME */
.time {
    font-size:10px;
    opacity:0.6;
    text-align:right;
    margin-top:5px;
}

/* FORM */
form {
    position:fixed;
    bottom:0;
    width:100%;
    background:rgba(22,27,34,0.95);
    padding:10px;
}

.form-wrap {
    max-width:600px;
    margin:auto;
    display:flex;
    gap:6px;
}

/* INPUT */
input[type="text"] {
    flex:1;
    padding:12px;
    border-radius:10px;
    border:none;
}

/* BUTTON */
button {
    padding:12px;
    border:none;
    border-radius:10px;
    background:#238636;
    color:white;
}

/* FILE */
input[type="file"] {
    width:70px;
}

/* MEDIA */
img {
    max-width:100%;
    border-radius:10px;
    margin-top:5px;
}

audio {
    width:100%;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="header">💬 GIXN CHAT</div>

<div id="chat">
    <div class="chat-wrap" id="chatWrap"></div>
</div>

<form id="form">
    <div class="form-wrap">
        <input id="msg" placeholder="Ketik pesan...">
        <input type="file" id="file">
        <button>Kirim</button>
    </div>
</form>

<script>
var socket = io();
var user = "{{user}}";

let chat = document.getElementById("chatWrap");

// ambil waktu
function getTime(){
    let d = new Date();
    return d.getHours().toString().padStart(2,'0') + ":" +
           d.getMinutes().toString().padStart(2,'0');
}

// TERIMA
socket.on("message", function(data){
    let div = document.createElement("div");

    let isMe = data.user === user;
    div.className = "msg " + (isMe ? "right":"left");

    let html = `
        <div class="name" style="color:${data.color}">
            ${data.user}
        </div>
    `;

    if(data.msg.startsWith("/file/")){
        if(data.msg.match(/\.(jpg|png|jpeg|gif)$/)){
            html += `<img src="${data.msg}">`;
        } else if(data.msg.match(/\.(mp3|wav)$/)){
            html += `<audio controls src="${data.msg}"></audio>`;
        } else {
            html += `<a href="${data.msg}">Download</a>`;
        }
    } else {
        html += `<div>${data.msg}</div>`;
    }

    html += `<div class="time">${getTime()}</div>`;

    div.innerHTML = html;
    chat.appendChild(div);

    document.getElementById("chat").scrollTop = 999999;
});

// KIRIM
document.getElementById("form").onsubmit = (e)=>{
    e.preventDefault();

    let msg = document.getElementById("msg").value;
    if(!msg) return;

    socket.emit("msg", {user:user, msg:msg});
    document.getElementById("msg").value="";
};

// FILE
document.getElementById("file").onchange = async function(){
    let file = this.files[0];

    let form = new FormData();
    form.append("file", file);

    let res = await fetch("/upload", {method:"POST", body:form});
    let data = await res.json();

    socket.emit("msg", {user:user, msg:data.url});
};
</script>

</body>
</html>
