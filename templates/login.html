<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:sans-serif;
    color:white;
    overflow:hidden;
}

/* 🌌 BACKGROUND SAMA SEPERTI CHAT */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle, #0d1117, #000);
    z-index:-2;
}

body::after {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(0,255,0,0.05) 0px,
        rgba(0,255,0,0.05) 1px,
        transparent 1px,
        transparent 3px
    );
    animation: scan 6s linear infinite;
    z-index:-1;
}

@keyframes scan {
    from { transform: translateY(0); }
    to { transform: translateY(100px); }
}

/* CONTAINER */
.container {
    width:90%;
    max-width:360px;
    background: rgba(22,27,34,0.85);
    padding:25px;
    border-radius:14px;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    text-align:center;
}

/* TITLE */
h2 {
    margin-bottom:20px;
}

/* INPUT */
input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    background:#0d1117;
    color:white;
    font-size:14px;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#238636;
    color:white;
    font-weight:bold;
    margin-top:10px;
}

/* TEXT */
.small {
    margin-top:12px;
    font-size:12px;
    opacity:0.6;
}

/* HOVER */
button:hover {
    background:#2ea043;
}
</style>
</head>

<body>

<div class="container">
    <h2>💬 GIXN LOGIN</h2>

    <form method="POST">
        <input name="user" placeholder="Username" required>
        <input name="pw" placeholder="Password" required>
        <button>Masuk</button>
    </form>

    <div class="small">Password: @123</div>
</div>

</body>
</html>
